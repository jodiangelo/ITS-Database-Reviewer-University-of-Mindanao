<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITS Database Reviewer – University of Mindanao</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #07090f;
  --surface: #0d1117;
  --surface2: #141922;
  --border: #1e2535;
  --accent: #4f8ef7;
  --accent2: #7aabff;
  --green: #3dd68c;
  --red: #f05252;
  --yellow: #fbbf24;
  --text: #dce6f5;
  --muted: #5a6a8a;
  --card: #0f141e;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; min-height: 100vh; padding-bottom: 80px; }

/* HEADER */
header {
  background: linear-gradient(180deg, #0a0f1a 0%, #0d1117 100%);
  border-bottom: 1px solid var(--border);
  padding: 24px 24px 16px;
  text-align: center;
  position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(16px);
}
header h1 { font-size: clamp(16px, 2.5vw, 22px); font-weight: 800; color: #fff; letter-spacing: -0.3px; }
header h1 em { color: var(--accent); font-style: normal; }
header p { font-size: 11px; color: var(--muted); margin-top: 3px; font-family: 'JetBrains Mono', monospace; }

/* STATS */
.stats-bar {
  display: flex; justify-content: center; gap: 24px; padding: 12px 24px;
  background: var(--surface); border-bottom: 1px solid var(--border); flex-wrap: wrap;
}
.stat { display: flex; align-items: center; gap: 6px; font-size: 13px; }
.stat-label { color: var(--muted); font-size: 12px; }
.stat-val { font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 14px; }
.stat-val.score { color: var(--accent); }
.stat-val.correct { color: var(--green); }
.stat-val.wrong { color: var(--red); }
.stat-val.unanswered { color: var(--yellow); }

/* CONTROLS */
.controls { display: flex; justify-content: center; gap: 8px; padding: 12px 24px; flex-wrap: wrap; }
.btn { padding: 8px 18px; border-radius: 8px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Outfit', sans-serif; transition: all .15s; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent2); }
.btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }
.btn-danger { background: #2a1215; color: var(--red); border: 1px solid #3d1c20; }
.btn-danger:hover { background: #3d1c20; }

/* FILTER */
.filter-bar { display: flex; justify-content: center; gap: 6px; padding: 8px 24px; flex-wrap: wrap; }
.filter-btn { padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s; font-family: 'Outfit', sans-serif; }
.filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* SEARCH */
.search-wrap { display: flex; justify-content: center; padding: 8px 24px; }
.search-wrap input { width: 100%; max-width: 480px; padding: 9px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 13px; font-family: 'Outfit', sans-serif; outline: none; }
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap input::placeholder { color: var(--muted); }

/* PROGRESS */
.progress-container { padding: 6px 24px 4px; }
.progress-bg { background: var(--surface2); border-radius: 4px; height: 4px; overflow: hidden; }
.progress-fill { background: var(--accent); height: 100%; width: 0; transition: width .3s ease; border-radius: 4px; }

/* QUESTIONS */
.qcontainer { max-width: 860px; margin: 0 auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }

.qcard {
  background: var(--card); border: 1px solid var(--border); border-radius: 12px;
  overflow: hidden; transition: border-color .2s;
}
.qcard.correct { border-color: #1d4d36; }
.qcard.wrong { border-color: #4d1d1d; }
.qcard.hidden { display: none; }

.qhead {
  display: flex; align-items: flex-start; gap: 10px; padding: 14px 16px;
  cursor: pointer; user-select: none;
}
.qnum {
  font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600;
  color: var(--muted); background: var(--surface2); border: 1px solid var(--border);
  border-radius: 5px; padding: 2px 7px; flex-shrink: 0; margin-top: 1px;
}
.qtext { font-size: 13.5px; line-height: 1.6; flex: 1; font-weight: 500; }
.qstatus {
  font-size: 13px; font-weight: 700; flex-shrink: 0; width: 22px; height: 22px;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  margin-top: 1px; font-family: 'JetBrains Mono', monospace;
}
.qstatus.unanswered { background: var(--surface2); color: var(--muted); font-size: 10px; }
.qstatus.correct { background: #1d4d36; color: var(--green); }
.qstatus.wrong { background: #4d1d1d; color: var(--red); }
.carrow { font-size: 11px; color: var(--muted); flex-shrink: 0; margin-top: 5px; transition: transform .2s; }
.qcard.collapsed .carrow { transform: rotate(-90deg); }
.qcard.collapsed .qbody { display: none; }

.qbody { padding: 0 16px 14px 16px; }
.multi-tag { font-size: 11px; color: var(--yellow); font-family: 'JetBrains Mono', monospace; margin-bottom: 10px; background: #2a2010; padding: 3px 8px; border-radius: 4px; display: inline-block; }
.choices { display: flex; flex-direction: column; gap: 6px; }

.choice {
  display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px;
  border-radius: 8px; border: 1px solid var(--border); background: var(--surface2);
  cursor: pointer; transition: all .15s;
}
.choice:hover:not(.disabled) { border-color: var(--accent); background: #111a2e; }
.choice.disabled { cursor: default; }
.choice.sc { border-color: #1d4d36; background: #0d2b1e; }
.choice.sw { border-color: #4d1d1d; background: #2b0d0d; }
.choice.rc { border-color: #1d4d36; background: #0d2b1e; }

.cletter {
  font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700;
  width: 22px; height: 22px; border-radius: 5px; display: flex; align-items: center;
  justify-content: center; background: var(--surface); color: var(--muted);
  border: 1px solid var(--border); flex-shrink: 0; margin-top: 1px;
}
.choice.sc .cletter { background: var(--green); color: #000; border-color: var(--green); }
.choice.sw .cletter { background: var(--red); color: #fff; border-color: var(--red); }
.choice.rc .cletter { background: var(--green); color: #000; border-color: var(--green); }

.ctext { font-size: 13px; line-height: 1.5; flex: 1; }
.cicon { font-size: 13px; flex-shrink: 0; margin-top: 3px; }
.choice.sc .cicon { color: var(--green); }
.choice.sw .cicon { color: var(--red); }
.choice.rc .cicon { color: var(--green); }

.q-submit-btn {
  margin-top: 10px; padding: 8px 18px; border-radius: 7px;
  background: var(--accent); color: #fff; border: none; font-size: 13px;
  cursor: pointer; font-family: 'Outfit', sans-serif; font-weight: 600;
  display: none; transition: background .15s;
}
.q-submit-btn:hover { background: var(--accent2); }
.q-submit-btn.show { display: inline-block; }

.expl {
  margin-top: 10px; padding: 10px 13px; border-radius: 8px;
  background: var(--surface); border-left: 3px solid var(--accent);
  font-size: 12.5px; color: var(--muted); line-height: 1.6; display: none;
}
.expl.show { display: block; }
.expl strong { color: var(--accent2); }

/* POPUP */
#popup {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.75);
  backdrop-filter: blur(8px); z-index: 999; align-items: center; justify-content: center;
}
#popup.show { display: flex; }
.popup-box {
  background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
  padding: 40px; text-align: center; max-width: 400px; width: 90%;
}
.popup-box h2 { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
.pop-pct { font-size: 64px; font-weight: 800; color: var(--accent); line-height: 1; margin-bottom: 8px; }
.pop-breakdown { display: flex; justify-content: center; gap: 32px; margin: 20px 0; }
.pb-item .pb-val { font-size: 28px; font-weight: 700; }
.pb-item .pb-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
.pop-grade { font-size: 15px; font-weight: 700; padding: 10px 20px; border-radius: 8px; margin: 12px auto; display: inline-block; }
.pop-grade.pass { background: #0d2b1e; color: var(--green); }
.pop-grade.fail { background: #2b0d0d; color: var(--red); }
.pop-btns { display: flex; gap: 8px; justify-content: center; margin-top: 16px; }

/* SCROLL TOP */
#scrolltop {
  position: fixed; bottom: 24px; right: 24px; width: 40px; height: 40px;
  border-radius: 50%; background: var(--accent); color: #fff; border: none;
  font-size: 16px; cursor: pointer; display: none; z-index: 200;
  align-items: center; justify-content: center;
}
#scrolltop.show { display: flex; }

/* BADGE */
.type-badge {
  font-size: 10px; font-family: 'JetBrains Mono', monospace; font-weight: 600;
  padding: 2px 6px; border-radius: 4px; flex-shrink: 0;
}
.type-badge.multi { background: #2a2010; color: var(--yellow); }
.type-badge.single { background: #101828; color: var(--muted); }

/* PENDING HIGHLIGHT */
.choice.pending { border-color: var(--accent); background: #111a2e; }
</style>
</head>
<body>

<header>
  <h1>ITS <em>Database</em> Reviewer</h1>
  <p>University of Mindanao · 40 Random Questions · <span id="hdr-sub">Session Active</span></p>
</header>

<div class="stats-bar">
  <div class="stat">
    <span class="stat-label">SCORE</span>
    <span class="stat-val score" id="st-score">0/40</span>
  </div>
  <div class="stat">
    <span class="stat-label">✓</span>
    <span class="stat-val correct" id="st-correct">0</span>
  </div>
  <div class="stat">
    <span class="stat-label">✗</span>
    <span class="stat-val wrong" id="st-wrong">0</span>
  </div>
  <div class="stat">
    <span class="stat-label">–</span>
    <span class="stat-val unanswered" id="st-unanswered">40</span>
  </div>
</div>

<div class="controls">
  <button class="btn btn-primary" onclick="submitAll()">Submit All &amp; Score</button>
  <button class="btn btn-outline" onclick="toggleAll(true)">Collapse All</button>
  <button class="btn btn-outline" onclick="toggleAll(false)">Expand All</button>
  <button class="btn btn-danger" onclick="newSet()">🔀 New Random Set</button>
</div>

<div class="filter-bar">
  <button class="filter-btn active" onclick="setFilter('all',this)">All (40)</button>
  <button class="filter-btn" onclick="setFilter('unanswered',this)">Unanswered</button>
  <button class="filter-btn" onclick="setFilter('correct',this)">Correct</button>
  <button class="filter-btn" onclick="setFilter('wrong',this)">Wrong</button>
</div>

<div class="search-wrap">
  <input type="text" placeholder="Search questions or choices..." oninput="doSearch(this.value)">
</div>

<div class="progress-container">
  <div class="progress-bg"><div class="progress-fill" id="pfill"></div></div>
</div>

<div class="qcontainer" id="qc"></div>

<div id="popup">
  <div class="popup-box">
    <h2>📊 Quiz Results</h2>
    <div class="pop-pct" id="ppct">0%</div>
    <div class="pop-breakdown">
      <div class="pb-item"><div class="pb-val" id="pcor" style="color:var(--green)">0</div><div class="pb-label">Correct</div></div>
      <div class="pb-item"><div class="pb-val" id="pwrg" style="color:var(--red)">0</div><div class="pb-label">Wrong</div></div>
      <div class="pb-item"><div class="pb-val" id="pskp" style="color:var(--yellow)">0</div><div class="pb-label">Skipped</div></div>
    </div>
    <div class="pop-grade" id="pgrade"></div>
    <div class="pop-btns">
      <button class="btn btn-outline" onclick="closePopup()">Review Answers</button>
      <button class="btn btn-danger" onclick="newSet();closePopup()">🔀 New Set</button>
    </div>
  </div>
</div>

<button id="scrolltop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
// ============================================================
// QUESTION DATA — 200 questions exactly from PDF
// ============================================================
const ALL_QUESTIONS = [
  {
    id:1,
    text:"You manage a database named Exams accessed via a website. The website is regularly accessed by users in different countries. You are redesigning a table named History that records when users have purchased and taken online exams. You need one of the columns in the History table to record what time of day that a user has taken an exam. Additionally, you need this column to have time zone awareness. What data type should you use?",
    type:"single",
    choices:["Use two different columns with one column of datetime, and the second column indicating the UTC offset","datetimeoffset","datetime","datetime2"],
    answer:[1],
    expl:"<strong>datetimeoffset</strong> stores date, time, and the UTC offset in a single column, providing full time zone awareness."
  },
  {
    id:2,
    text:"This question requires that you evaluate the underlined text to determine if it is correct.\n\n\"<u>Views</u> are database objects that contain all of the data in a database.\"\n\nIf the statement is incorrect, select the answer choice that makes the statement correct.",
    type:"single",
    choices:["Tables","Queries","No change is needed","Stored procedures"],
    answer:[0],
    expl:"<strong>Tables</strong> are the database objects that contain all of the data. Views are virtual tables derived from SELECT queries — they do not store data themselves."
  },
  {
    id:3,
    text:"You have two tables named Cars and Color as defined below. The two tables are related by ColorId. You run the following SQL statement:\n\nSELECT * FROM Cars INNER JOIN Color ON Cars.ColorId = Color.ColorId\n\nHow many rows does the SQL statement return?",
    type:"single",
    choices:["6","0","3","2"],
    answer:[3],
    expl:"An INNER JOIN returns only matching rows. Based on the Cars and Color tables in the PDF (Cars has 3 rows, but only 2 have matching ColorIds in the Color table), the result is <strong>2 rows</strong>."
  },
  {
    id:4,
    text:"Fill in the blank with the appropriate word.\n\nThe _______________ model for database management is a database model based on first-order predicate logic.",
    type:"single",
    choices:["Traditional","Truncate","Relational"],
    answer:[2],
    expl:"The <strong>Relational</strong> model is based on first-order predicate logic. It organizes data into tables and uses mathematical set theory to manage relationships."
  },
  {
    id:5,
    text:"You work as a MySQL Database Administrator. Your server crashed and it was recovered and made online within half an hour. What will you do to ensure that the table structure and contents are in a proper state?",
    type:"single",
    choices:["Perform a table optimization operation","Perform a table repair operation","Perform a table check operation","Perform a table analysis operation"],
    answer:[1],
    expl:"<strong>REPAIR TABLE</strong> fixes corrupted MyISAM tables after a crash, restoring both structure and data integrity."
  },
  {
    id:6,
    text:"James works as an Administrator for Softech Inc. The company has a SQL Server 2005 computer named SQL1. The company has six departments; Accounting, Sales, Marketing, Manufacturing, Production, and Research. The user accounts of each department are located in a domain group named after the department. James wants to create a separate database on SQL1 for each department. Users in each department must be able to read and update data in their respective database. No user must be able to access the database belonging to another department. What should James do to accomplish the task?",
    type:"single",
    choices:[
      "Create a Windows Authentication login for each domain group; configure logins as database users for the appropriate database; add each user to the db_datareader and db_datawriter roles",
      "Create a Windows Authentication login for each domain user; configure logins as database users for the appropriate database; add each user to the db_datareader and db_datawriter roles",
      "Create a Windows Authentication login for each domain user; configure logins as database users for the appropriate database; add each user to the db_ddladmin database role",
      "Create a Windows Authentication login for each domain group; configure logins as database users for the appropriate database; add each user to the db_ddladmin database role"
    ],
    answer:[0],
    expl:"Creating logins per <strong>domain group</strong> (not individual user) and assigning <strong>db_datareader and db_datawriter</strong> roles grants read/write access without DDL privileges."
  },
  {
    id:7,
    text:"Which of the following is the process of creating a design for the database that will support the enterprise's operations and objectives for the required database system?",
    type:"single",
    choices:["Identifying relationships between objects","Database planning","Database design","Application design"],
    answer:[2],
    expl:"<strong>Database design</strong> is the process of creating a structured schema that supports an enterprise's operations and objectives."
  },
  {
    id:8,
    text:"You are the database administrator for a MySQL database. The database server is installed on a Unix system. The time zone files for the system are located at /usr/share/zoneinfo. You need to ensure that the system and MySQL time zones are based on the same information. Which of the following statements will you use to accomplish the task?",
    type:"single",
    choices:[
      "shell> /usr/share/zoneinfo mysql_tzinfo_to_sql | mysql -u root mysql",
      "shell> mysql_tz_to_sql /usr/share/zoneinfo | mysql -u root mysql",
      "shell> mysql_tzinfo_to_sql /usr/share/zoneinfo | mysql -u root mysql",
      "shell> /usr/share/zoneinfo mysql_tz_to_sql | mysql -u root mysql"
    ],
    answer:[2],
    expl:"<strong>mysql_tzinfo_to_sql /usr/share/zoneinfo | mysql -u root mysql</strong> converts Unix timezone files into SQL and loads them into MySQL's time zone tables."
  },
  {
    id:9,
    text:"What is the ideal time to back up dynamic log files?",
    type:"single",
    choices:["When the server is running","When the server is shut down","You can back up dynamic log files any time","When the server is stopped"],
    answer:[2],
    expl:"Dynamic log files can be backed up <strong>any time</strong> — they support online backup while the server is running because they are continuously written."
  },
  {
    id:10,
    text:"Mark works as a Database Designer for Reon Inc. He is assigned the task to create a database for the company. He issues the following query:\n\nCREATE DATABASE '24342'\n\nWhat will be the output of the query?",
    type:"single",
    choices:[
      "A database will be created",
      "An error will be generated stating that a database name must begin with an alphabet and all the alphabets should be in uppercase",
      "An error will be generated stating that a database name should be a combination of numerals and alphabets",
      "An error will be generated stating that a database name must begin with an alphabet"
    ],
    answer:[3],
    expl:"A database name starting with only digits (like '24342') is invalid. MySQL requires the name to <strong>begin with an alphabet</strong>."
  },
  {
    id:11,
    text:"Which of the following commands cannot be rolled back? Each correct answer represents a complete solution. (Choose two.)",
    type:"multi",
    choices:["UPDATE","TRUNCATE","COMMIT","DELETE"],
    answer:[1,2],
    expl:"<strong>TRUNCATE</strong> is a DDL command and implicitly commits — it cannot be rolled back. <strong>COMMIT</strong> permanently saves transaction changes and is irreversible."
  },
  {
    id:12,
    text:"Which of the following are the types of prototyping strategies? Each correct answer represents a complete solution. (Choose two.)",
    type:"multi",
    choices:["Physical prototyping","Evolutionary prototyping","Requirements prototyping","Revolutionary prototyping"],
    answer:[1,2],
    expl:"The two types are <strong>Evolutionary prototyping</strong> (continuously refining a working model) and <strong>Requirements prototyping</strong> (built to clarify requirements, then discarded)."
  },
  {
    id:13,
    text:"Which of the following DML SQL statements support usage of correlated sub-queries? Each correct answer represents a complete solution. (Choose all that apply.)",
    type:"multi",
    choices:["SELECT","INSERT","UPDATE","DELETE"],
    answer:[0,1,2,3],
    expl:"Correlated subqueries are supported in <strong>SELECT, INSERT, UPDATE, and DELETE</strong> — all four DML statements."
  },
  {
    id:14,
    text:"What is the relationship between the foreign key and primary key? Each correct answer represents a complete solution. (Choose all that apply.)",
    type:"multi",
    choices:[
      "A foreign key and a primary key create a link between two entities",
      "There is no relationship between a primary key and a foreign key",
      "A foreign key ties attribute(s) of an entity to the primary key of another entity, for the purpose of creating a dependency",
      "A foreign key constraint works in conjunction with a primary key constraint to enforce referential integrity among related entities"
    ],
    answer:[0,2,3],
    expl:"A foreign key (A) creates a link between entities, (C) ties attributes to another entity's primary key, and (D) enforces referential integrity together with the primary key constraint."
  },
  {
    id:15,
    text:"Remo works as a Database Designer for Tech Inc. He wants to create a table named Product. He issues the following query:\n\nCREATE Product (\n  ProductID Char (10) NOT NULL,\n  OrderID Char (10) NULL\n  ProductName Varchar NOT NULL,\n  Primary key (OrderID, ProductID))\n\nWhat are the errors in the above query? Each correct answer represents a complete solution. (Choose two.)",
    type:"multi",
    choices:[
      "An attribute declared as a primary key cannot contain NULL values",
      "Each attribute should be defined as a primary key separately",
      "A table cannot have two primary keys",
      "ProductName is declared as Varchar without specifying the width of the column"
    ],
    answer:[0,3],
    expl:"Two errors: (A) <strong>OrderID is NULL but used in Primary Key</strong> — PK columns must be NOT NULL; (D) <strong>Varchar requires a width</strong> specification, e.g., Varchar(50)."
  },
  {
    id:16,
    text:"Which of the following steps in database planning is used to record an object so that it is represented visually in the system?",
    type:"single",
    choices:["Identifying the relationships between objects","Gathering information","Object identification","Object modeling"],
    answer:[3],
    expl:"<strong>Object modeling</strong> is the step that visually represents objects in the system using diagrams such as ER diagrams."
  },
  {
    id:17,
    text:"You are the database administrator for a MySQL database server. The network contains new and old (pre-4.1) clients. Some users receive the error: \"ERROR 1251: The client does not support authentication protocol requested by the server.\" You do not want to upgrade any client or server right now, and want to enable all clients to connect to the new server successfully. Which of the following steps will you take?",
    type:"single",
    choices:[
      "Run the server with the –secure-auth option",
      "Run the server with the –old-password option",
      "Run the server with the –allow-old option",
      "Run the server with the –enable-old option"
    ],
    answer:[1],
    expl:"<strong>--old-password</strong> makes the server use the older pre-4.1 password hashing algorithm, allowing old clients to authenticate without upgrading."
  },
  {
    id:18,
    text:"In addition to taking backups of your databases, you should also backup other files. Which of these files store updates that have been made after the backup was made?",
    type:"single",
    choices:["Binary log files","My.ini","My.cnf","Master.info"],
    answer:[0],
    expl:"<strong>Binary log files</strong> record all changes made to the database after the last backup, enabling point-in-time recovery."
  },
  {
    id:19,
    text:"Which of the following is a building working model of a database system?",
    type:"single",
    choices:["Prototyping","Bottom-up approach","Conceptual database design","Top-down approach"],
    answer:[0],
    expl:"<strong>Prototyping</strong> is the process of building a working model of a database system to test feasibility and gather user feedback."
  },
  {
    id:20,
    text:"Which of the following scripts is used to convert Unix-type zone files into SQL statements, and loads the time zone tables in a mysql database?",
    type:"single",
    choices:["mysql_time_to_sql","mysql_tzinfo_to_sql","mysql_tz_to_sql","mysql_timezone_to_sql"],
    answer:[1],
    expl:"<strong>mysql_tzinfo_to_sql</strong> converts Unix timezone files into SQL INSERT statements for MySQL's time zone tables."
  },
  {
    id:21,

// ============================================================
// CONFIG
// ============================================================
const QUIZ_SIZE = 40;

// ============================================================
// STATE
// ============================================================
let answered = {};     // uid -> [chosen indices in shuffled space]
let pending = {};      // uid -> [pending selections for multi]
let activeQ = [];      // 40 enriched question objects for this session
let curFilter = 'all';
let curSearch = '';

// ============================================================
// RANDOMIZER
// ============================================================
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickSet() {
  const pool = shuffle(ALL_QUESTIONS).slice(0, QUIZ_SIZE);
  return pool.map((q, idx) => {
    // Shuffle choices and remap answers
    const origIndices = q.choices.map((_, i) => i);
    const shuffled = shuffle(origIndices);  // shuffled[newPos] = origIdx
    const remapped = q.answer.map(origIdx => shuffled.indexOf(origIdx));
    return {
      ...q,
      _uid: `${q.id}_${idx}`,
      displayChoices: shuffled.map(oi => q.choices[oi]),
      remappedAnswer: remapped,
      shuffledIndices: shuffled
    };
  });
}

// ============================================================
// SESSION PERSISTENCE
// ============================================================
function saveSession() {
  try {
    const meta = activeQ.map(q => ({ id: q.id, uid: q._uid, si: q.shuffledIndices }));
    localStorage.setItem('its_session', JSON.stringify(meta));
    localStorage.setItem('its_answers', JSON.stringify(answered));
  } catch(e) {}
}

function loadSession() {
  try {
    const metaRaw = localStorage.getItem('its_session');
    const ansRaw = localStorage.getItem('its_answers');
    if (!metaRaw) return false;
    const meta = JSON.parse(metaRaw);
    if (meta.length !== QUIZ_SIZE) return false;
    answered = ansRaw ? JSON.parse(ansRaw) : {};
    activeQ = meta.map(m => {
      const q = ALL_QUESTIONS.find(x => x.id === m.id);
      if (!q) return null;
      const si = m.si;
      const remapped = q.answer.map(oi => si.indexOf(oi));
      return { ...q, _uid: m.uid, displayChoices: si.map(i => q.choices[i]), remappedAnswer: remapped, shuffledIndices: si };
    }).filter(Boolean);
    return activeQ.length === QUIZ_SIZE;
  } catch(e) { return false; }
}

// ============================================================
// RENDER
// ============================================================
function render() {
  const container = document.getElementById('qc');
  container.innerHTML = '';
  activeQ.forEach((q, displayIdx) => {
    const uid = q._uid;
    const isAnswered = answered[uid] !== undefined;
    const isCorrect = isAnswered && checkAns(uid);
    const isMulti = q.type === 'multi';

    const card = document.createElement('div');
    card.className = 'qcard' + (isAnswered ? (isCorrect ? ' correct' : ' wrong') : '');
    card.id = 'card_' + uid;

    const statusClass = isAnswered ? (isCorrect ? 'correct' : 'wrong') : 'unanswered';
    const statusIcon = isAnswered ? (isCorrect ? '✓' : '✗') : '–';

    const choicesHtml = q.displayChoices.map((c, i) => {
      let cls = 'choice';
      let icon = '';
      if (isAnswered) {
        cls += ' disabled';
        const sel = answered[uid];
        const isSel = sel.includes(i);
        const isCor = q.remappedAnswer.includes(i);
        if (isSel && isCor) { cls += ' sc'; icon = '<span class="cicon">✓</span>'; }
        else if (isSel && !isCor) { cls += ' sw'; icon = '<span class="cicon">✗</span>'; }
        else if (!isSel && isCor) { cls += ' rc'; icon = '<span class="cicon">✓</span>'; }
      }
      const letters = ['A','B','C','D','E','F'];
      return `<div class="${cls}" onclick="pick('${uid}',${i},${isMulti})">
        <span class="cletter">${letters[i]}</span>
        <span class="ctext">${escHtml(c)}</span>
        ${icon}
      </div>`;
    }).join('');

    card.innerHTML = `
      <div class="qhead" onclick="toggleCard('${uid}')">
        <span class="qnum">Q${displayIdx+1}</span>
        <div class="qtext">${escHtml(q.text)}</div>
        <span class="qstatus ${statusClass}">${statusIcon}</span>
        <span class="carrow">▾</span>
      </div>
      <div class="qbody">
        ${isMulti ? '<div class="multi-tag">★ SELECT ALL THAT APPLY</div>' : ''}
        <div class="choices" id="choices_${uid}">${choicesHtml}</div>
        <button class="q-submit-btn${isMulti && !isAnswered ? ' show' : ''}" id="sub_${uid}" onclick="submitMulti('${uid}')">Submit Answer</button>
        <div class="expl${isAnswered ? ' show' : ''}" id="expl_${uid}">${q.expl}</div>
      </div>`;

    container.appendChild(card);
  });
  updateStats();
  applyFilter();
}

function escHtml(str) {
  return str
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/\n/g,'<br>');
}

function toggleCard(uid) {
  document.getElementById('card_' + uid)?.classList.toggle('collapsed');
}

function toggleAll(collapse) {
  activeQ.forEach(q => {
    const el = document.getElementById('card_' + q._uid);
    if (el && !el.classList.contains('hidden')) {
      el.classList.toggle('collapsed', collapse);
    }
  });
}

// ============================================================
// INTERACTION
// ============================================================
function pick(uid, idx, isMulti) {
  if (answered[uid] !== undefined) return;
  if (!isMulti) {
    answered[uid] = [idx];
    const q = activeQ.find(x => x._uid === uid);
    refreshCard(q);
    updateStats();
    saveSession();
  } else {
    if (!pending[uid]) pending[uid] = [];
    const pos = pending[uid].indexOf(idx);
    if (pos >= 0) pending[uid].splice(pos, 1);
    else pending[uid].push(idx);
    updatePendingVisual(uid);
  }
}

function updatePendingVisual(uid) {
  const sel = pending[uid] || [];
  const container = document.getElementById('choices_' + uid);
  if (!container) return;
  container.querySelectorAll('.choice').forEach((el, i) => {
    el.classList.toggle('pending', sel.includes(i));
  });
}

function submitMulti(uid) {
  if (!pending[uid] || pending[uid].length === 0) return;
  answered[uid] = pending[uid].slice().sort((a,b) => a-b);
  const q = activeQ.find(x => x._uid === uid);
  refreshCard(q);
  updateStats();
  saveSession();
}

function checkAns(uid) {
  const q = activeQ.find(x => x._uid === uid);
  if (!q) return false;
  const sel = (answered[uid] || []).slice().sort((a,b) => a-b);
  const ans = q.remappedAnswer.slice().sort((a,b) => a-b);
  return JSON.stringify(sel) === JSON.stringify(ans);
}

function refreshCard(q) {
  const uid = q._uid;
  const card = document.getElementById('card_' + uid);
  if (!card) return;
  const isCorrect = checkAns(uid);
  card.classList.remove('correct','wrong');
  card.classList.add(isCorrect ? 'correct' : 'wrong');

  const letters = ['A','B','C','D','E','F'];
  const container = document.getElementById('choices_' + uid);
  container.querySelectorAll('.choice').forEach((el, i) => {
    el.className = 'choice disabled';
    const sel = answered[uid];
    const isSel = sel.includes(i);
    const isCor = q.remappedAnswer.includes(i);
    const existing = el.querySelector('.cicon');
    if (existing) existing.remove();
    if (isSel && isCor) { el.classList.add('sc'); el.insertAdjacentHTML('beforeend','<span class="cicon">✓</span>'); }
    else if (isSel && !isCor) { el.classList.add('sw'); el.insertAdjacentHTML('beforeend','<span class="cicon">✗</span>'); }
    else if (!isSel && isCor) { el.classList.add('rc'); el.insertAdjacentHTML('beforeend','<span class="cicon">✓</span>'); }
  });

  const st = card.querySelector('.qstatus');
  st.className = `qstatus ${isCorrect ? 'correct' : 'wrong'}`;
  st.textContent = isCorrect ? '✓' : '✗';

  const subBtn = document.getElementById('sub_' + uid);
  if (subBtn) subBtn.style.display = 'none';

  const expl = document.getElementById('expl_' + uid);
  if (expl) expl.classList.add('show');
}

// ============================================================
// STATS
// ============================================================
function updateStats() {
  const keys = Object.keys(answered).filter(uid => activeQ.find(q => q._uid === uid));
  const total = QUIZ_SIZE;
  const done = keys.length;
  const correct = keys.filter(uid => checkAns(uid)).length;
  const wrong = done - correct;
  const unanswered = total - done;

  document.getElementById('st-score').textContent = `${correct}/${total}`;
  document.getElementById('st-correct').textContent = correct;
  document.getElementById('st-wrong').textContent = wrong;
  document.getElementById('st-unanswered').textContent = unanswered;
  document.getElementById('pfill').style.width = (done / total * 100) + '%';
}

// ============================================================
// FILTER & SEARCH
// ============================================================
function setFilter(type, btn) {
  curFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilter();
}

function doSearch(val) {
  curSearch = val.toLowerCase();
  applyFilter();
}

function applyFilter() {
  activeQ.forEach(q => {
    const uid = q._uid;
    const card = document.getElementById('card_' + uid);
    if (!card) return;
    let show = true;
    if (curFilter === 'unanswered') show = answered[uid] === undefined;
    else if (curFilter === 'correct') show = answered[uid] !== undefined && checkAns(uid);
    else if (curFilter === 'wrong') show = answered[uid] !== undefined && !checkAns(uid);
    if (show && curSearch) {
      show = q.text.toLowerCase().includes(curSearch) ||
             q.displayChoices.some(c => c.toLowerCase().includes(curSearch));
    }
    card.classList.toggle('hidden', !show);
  });
}

// ============================================================
// SUBMIT ALL
// ============================================================
function submitAll() {
  const keys = Object.keys(answered).filter(uid => activeQ.find(q => q._uid === uid));
  const total = QUIZ_SIZE;
  const correct = keys.filter(uid => checkAns(uid)).length;
  const wrong = keys.length - correct;
  const skipped = total - keys.length;
  const pct = Math.round(correct / total * 100);

  document.getElementById('ppct').textContent = pct + '%';
  document.getElementById('pcor').textContent = correct;
  document.getElementById('pwrg').textContent = wrong;
  document.getElementById('pskp').textContent = skipped;

  const grade = document.getElementById('pgrade');
  const passed = pct >= 75;
  grade.className = 'pop-grade ' + (passed ? 'pass' : 'fail');
  grade.textContent = passed ? `🎉 PASSED! (${pct}%)` : `📚 Keep Studying (${pct}%)`;

  document.getElementById('popup').classList.add('show');
}

function closePopup() {
  document.getElementById('popup').classList.remove('show');
}

// ============================================================
// NEW SET
// ============================================================
function newSet() {
  if (!confirm('Get a new random set of 40 questions? Your current answers will be cleared.')) return;
  answered = {};
  pending = {};
  localStorage.removeItem('its_session');
  localStorage.removeItem('its_answers');
  activeQ = pickSet();
  saveSession();
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ============================================================
// SCROLL TOP
// ============================================================
window.addEventListener('scroll', () => {
  document.getElementById('scrolltop').classList.toggle('show', window.scrollY > 400);
});

// ============================================================
// INIT
// ============================================================
if (!loadSession()) {
  activeQ = pickSet();
  saveSession();
}
render();
</script>
